<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nawabi Aroma - Ethereal Glass</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1289a1",
                        "background-light": "#F9FAFB",
                        "background-dark": "#111e21",
                        "glass-surface": "rgba(255, 255, 255, 0.65)",
                        "glass-border": "rgba(255, 255, 255, 0.4)",
                        "text-ink": "#111111",
                        "text-muted": "#888888",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    animation: {
                        'scroll-down': 'scrollDown 2s cubic-bezier(0.77, 0, 0.175, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        scrollDown: {
                            '0%': { transform: 'scaleY(0)', transformOrigin: 'top' },
                            '50%': { transform: 'scaleY(1)', transformOrigin: 'top' },
                            '51%': { transform: 'scaleY(1)', transformOrigin: 'bottom' },
                            '100%': { transform: 'scaleY(0)', transformOrigin: 'bottom' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif; /* Default to display font for character */
        }
        
        .glass-panel {
            background: var(--glass-surface);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.03),
                inset 0 0 0 1px var(--glass-border);
        }

        .text-overlay-blend {
            mix-blend-mode: overlay;
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Custom Parallax Effect Container */
        .parallax-container {
            perspective: 1000px;
        }
    </style>
</head>
<body class="bg-background-light text-text-ink min-h-screen overflow-x-hidden selection:bg-primary/20 selection:text-primary">
<!-- Floating Navigation: Top on Desktop, Bottom on Mobile -->
<nav class="fixed z-50 w-full flex justify-center pointer-events-none px-4 top-6 md:top-8 max-md:top-auto max-md:bottom-6">
<div class="glass-panel pointer-events-auto flex items-center justify-between px-6 py-3 rounded-full gap-8 md:gap-16 transition-all duration-300 hover:shadow-lg hover:shadow-primary/5">
<!-- Desktop Links (Left) -->
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Shop</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">About</a>
</div>
<!-- Brand -->
<a class="text-xl md:text-2xl font-bold tracking-[0.2em] leading-none text-text-ink hover:opacity-70 transition-opacity" href="#">
                NAWABI
            </a>
<!-- Desktop Links (Right) & Mobile Menu -->
<div class="flex items-center gap-8">
<a class="hidden md:block text-sm font-medium hover:text-primary transition-colors" href="#">Journal</a>
<button aria-label="Cart" class="flex items-center gap-2 group cursor-pointer">
<span class="text-xs font-mono bg-text-ink text-white rounded-full size-5 flex items-center justify-center group-hover:bg-primary transition-colors">0</span>
</button>
<!-- Mobile Menu Icon (Visible only on mobile) -->
<button class="md:hidden text-text-ink">
<span class="material-symbols-outlined !text-[20px]">menu</span>
</button>
</div>
</div>
</nav>
<!-- Main Hero Section -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden parallax-container group/hero">
<!-- Background Typography: Deepest Layer (Z-0) -->
<div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none select-none opacity-10 md:opacity-100">
<h1 class="text-[12vw] md:text-[140px] lg:text-[180px] font-light leading-[0.8] tracking-tighter text-center text-[#E5E7EB] mix-blend-multiply w-full px-4">
                INVISIBLE <br class="hidden md:block"/> ARCHITECTURE
            </h1>
</div>
<!-- Product Image Layer: Middle Layer (Z-10) -->
<div class="relative z-10 w-full max-w-[300px] md:max-w-[420px] lg:max-w-[500px] aspect-[3/4] flex items-center justify-center animate-float">
<!-- Product Image -->
<img alt="A clear rectangular glass perfume bottle with a minimalist label standing on a white surface, casting soft shadows." class="w-full h-full object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMrT3RMQocO-khmZzuXBFTv7sR4v5bRecN26lsg1oWl0mrSlAMXXkBvkgRe3R1PqZmjbd7hGxfzLzt_9-eYpdm0phKuqJ2LT7J9OO2BOdD5yv8KsE2XnOeUoNBOQ3Gz8xq2HYcIN6AGn0way-lgZxJh9k5ES86EQJyfcnI929V7BE7b1GS0udAuKXF5Js7fq86nOwAezKajZfuOFA2kr4P6WFaceWpK-bV2e1aGByjoQ8eruTGTVSh_TqOKZt8TUcXRil2lgaKzEs" style="filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));"/>
<!-- Frosted Glass Overlay Pane: Front Layer (Z-20) - Interactive Parallax Element -->
<!-- Using translate on hover to simulate parallax movement opposite to cursor (simplified CSS version) -->
<div class="absolute top-1/4 -right-8 md:-right-16 w-32 h-32 md:w-48 md:h-64 glass-panel rounded-2xl z-20 flex items-center justify-center transform transition-transform duration-700 ease-out group-hover/hero:translate-x-4 group-hover/hero:translate-y-4">
<div class="text-center opacity-80">
<span class="block font-mono text-xs tracking-widest text-text-muted mb-1">NOTES</span>
<span class="block font-display text-lg font-medium text-text-ink">Santal</span>
<span class="block font-display text-lg font-medium text-text-ink">Cardamom</span>
<span class="block font-display text-lg font-medium text-text-ink">Iris</span>
</div>
</div>
<!-- Secondary Decorative Blur Element (Left) -->
<div class="absolute bottom-12 -left-4 md:-left-12 w-24 h-24 md:w-32 md:h-32 bg-gradient-to-tr from-white/40 to-transparent backdrop-blur-sm rounded-full z-20 transform transition-transform duration-1000 ease-out group-hover/hero:-translate-x-6 group-hover/hero:-translate-y-2 border border-white/20"></div>
</div>
<!-- Scroll Indicator: Bottom (Z-30) -->
<div class="absolute bottom-8 md:bottom-10 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-4">
<span class="text-[10px] tracking-[0.2em] font-mono text-text-muted uppercase opacity-60">Experience</span>
<div class="w-[1px] h-16 md:h-24 bg-gradient-to-b from-text-ink/0 via-text-ink/40 to-text-ink/0 overflow-hidden">
<div class="w-full h-full bg-text-ink animate-scroll-down"></div>
</div>
</div>
<!-- Decorative Light Leaks -->
<div class="absolute top-0 right-0 w-[50vw] h-[50vh] bg-gradient-to-b from-primary/5 to-transparent rounded-bl-[100%] filter blur-[100px] pointer-events-none z-0"></div>
<div class="absolute bottom-0 left-0 w-[40vw] h-[40vh] bg-gradient-to-t from-gray-200 to-transparent rounded-tr-[100%] filter blur-[80px] pointer-events-none z-0"></div>
</main>
<!-- Simple Script for subtle parallax on mouse move -->
<script>
        document.addEventListener('mousemove', (e) => {
            const panels = document.querySelectorAll('.glass-panel');
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;

            panels.forEach(panel => {
                // Only apply to the decorative panel, not the nav
                if(!panel.closest('nav')) {
                    panel.style.transform = `translateX(${x}px) translateY(${y}px)`;
                }
            });
            
            const title = document.querySelector('h1');
            if(title) {
                 title.style.transform = `translateX(${x * 0.5}px) translateY(${y * 0.5}px)`;
            }
        });
    </script>
</body></html>
