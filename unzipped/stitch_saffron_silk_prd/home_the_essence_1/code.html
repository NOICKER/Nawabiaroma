<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nawabi Aroma - Ethereal Glass (Dark Mode)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --color-ink: #FFFFFF;
            --color-canvas: #0A0A0A;
            --glass-surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-refraction: rgba(255, 255, 255, 0.4);
            --text-muted: #888888;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--color-canvas);
            color: var(--color-ink);
        }
        .glass-panel {
            background: var(--glass-surface);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .refraction-text {
            color: rgba(255, 255, 255, 0.15);
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.15) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            backdrop-filter: blur(2px);
        }
        .light-glow {
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    animation: {
                        'scroll-down': 'scrollDown 3s cubic-bezier(0.77, 0, 0.175, 1) infinite',
                        'float': 'float 8s ease-in-out infinite',
                    },
                    keyframes: {
                        scrollDown: {
                            '0%': { transform: 'scaleY(0)', transformOrigin: 'top' },
                            '50%': { transform: 'scaleY(1)', transformOrigin: 'top' },
                            '51%': { transform: 'scaleY(1)', transformOrigin: 'bottom' },
                            '100%': { transform: 'scaleY(0)', transformOrigin: 'bottom' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(0.5deg)' },
                        }
                    }
                },
            },
        }
    </script>
</head>
<body class="min-h-screen overflow-x-hidden selection:bg-white/10 selection:text-white">
<nav class="fixed z-50 w-full flex justify-center px-4 top-8 max-md:top-auto max-md:bottom-8">
<div class="glass-panel flex items-center justify-between px-8 py-3 rounded-full gap-12 md:gap-20 transition-all duration-500 hover:border-white/20">
<div class="hidden md:flex items-center gap-10">
<a class="text-[13px] uppercase tracking-[0.15em] font-medium hover:text-white/60 transition-colors" href="#">Shop</a>
<a class="text-[13px] uppercase tracking-[0.15em] font-medium hover:text-white/60 transition-colors" href="#">About</a>
</div>
<a class="text-xl md:text-2xl font-bold tracking-[0.3em] leading-none text-white" href="#">
                NAWABI
            </a>
<div class="flex items-center gap-10">
<a class="hidden md:block text-[13px] uppercase tracking-[0.15em] font-medium hover:text-white/60 transition-colors" href="#">Journal</a>
<button aria-label="Cart" class="flex items-center gap-2 group">
<span class="text-[10px] font-mono border border-white/30 text-white rounded-full size-6 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">0</span>
</button>
<button class="md:hidden text-white flex items-center">
<span class="material-symbols-outlined !text-[20px]">menu</span>
</button>
</div>
</div>
</nav>
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<div class="absolute top-0 left-1/4 w-[60vw] h-[60vh] bg-blue-500/10 light-glow rounded-full"></div>
<div class="absolute bottom-0 right-1/4 w-[50vw] h-[50vh] bg-purple-500/5 light-glow rounded-full"></div>
<div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none select-none">
<h1 class="text-[14vw] md:text-[160px] lg:text-[200px] font-light leading-[0.85] tracking-tighter text-center refraction-text w-full px-4">
                INVISIBLE <br class="hidden md:block"/> ARCHITECTURE
            </h1>
</div>
<div class="relative z-10 w-full max-w-[280px] md:max-w-[400px] lg:max-w-[480px] aspect-[3/4] flex items-center justify-center animate-float">
<div class="relative w-full h-full flex items-center justify-center">
<img alt="Luxury perfume bottle" class="w-full h-full object-contain relative z-10" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMrT3RMQocO-khmZzuXBFTv7sR4v5bRecN26lsg1oWl0mrSlAMXXkBvkgRe3R1PqZmjbd7hGxfzLzt_9-eYpdm0phKuqJ2LT7J9OO2BOdD5yv8KsE2XnOeUoNBOQ3Gz8xq2HYcIN6AGn0way-lgZxJh9k5ES86EQJyfcnI929V7BE7b1GS0udAuKXF5Js7fq86nOwAezKajZfuOFA2kr4P6WFaceWpK-bV2e1aGByjoQ8eruTGTVSh_TqOKZt8TUcXRil2lgaKzEs" style="filter: drop-shadow(0 30px 60px rgba(0,0,0,0.8)) brightness(0.9) contrast(1.1);"/>
<div class="absolute inset-0 bg-gradient-to-t from-white/5 to-transparent opacity-30 z-0 rounded-full blur-3xl"></div>
</div>
<div class="absolute top-1/3 -right-6 md:-right-12 w-32 h-40 md:w-44 md:h-56 glass-panel rounded-2xl z-20 flex flex-col items-center justify-center p-6 transform hover:translate-x-2 hover:-translate-y-2 transition-transform duration-700">
<div class="text-center">
<span class="block font-mono text-[9px] tracking-[0.3em] text-[var(--text-muted)] mb-4 uppercase">Composition</span>
<div class="space-y-2">
<span class="block font-display text-sm md:text-base font-light text-white/90">Santal</span>
<span class="block font-display text-sm md:text-base font-light text-white/90">Cardamom</span>
<span class="block font-display text-sm md:text-base font-light text-white/90">Iris Root</span>
</div>
</div>
</div>
<div class="absolute bottom-10 -left-6 md:-left-16 w-20 h-20 md:w-28 md:h-28 bg-white/5 backdrop-blur-md rounded-full z-20 border border-white/10 shadow-2xl flex items-center justify-center">
<div class="w-1/2 h-1/2 bg-white/10 rounded-full blur-xl"></div>
</div>
</div>
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-6">
<span class="text-[9px] tracking-[0.4em] font-mono text-[var(--text-muted)] uppercase">Scroll to Discover</span>
<div class="w-[1px] h-20 md:h-28 bg-white/10 overflow-hidden relative">
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-white to-transparent animate-scroll-down"></div>
</div>
</div>
</main>
<div class="fixed inset-0 pointer-events-none z-[1] bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.02)_0%,transparent_70%)]"></div>

</body></html>
